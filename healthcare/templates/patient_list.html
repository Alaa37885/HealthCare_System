<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        .container {
            width: 80%;
            margin: auto;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<a href="/doctors/">Doctors</a> |
<a href="/patients/">Patients</a> |
<a href="/book/">Book</a> |
<a href="/appointments/">Appointments</a>

<hr>

<div class="container">
    <h1>Patients</h1>

    {% for p in patients %}
    <div class="card">
        <h3>{{ p.user.first_name }} {{ p.user.last_name }}</h3>
        <p>Username: {{ p.user.username }}</p>
        <p>Age: {{ p.age }}</p>
    </div>
    {% empty %}
        <p>No patients found</p>
    {% endfor %}
</div>

</body>
</html>
